name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy demo app
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: superfly/flyctl-actions/setup-flyctl@63da3ecc5e2793b98a3f2519b3d75d4f4c11cec2 # master
      - name: Set version
        run: echo "DOGGO_VERSION=$(git describe --tags --always)" >> $GITHUB_ENV
      - run: flyctl deploy --remote-only --build-arg="DOGGO_VERSION=${DOGGO_VERSION}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
